name: Backend CI/CD

on:
  pull_request:
    branches:
      - main
    paths:
      - ".github/workflows/backend-ci-cd.yml"
      - "pyproject.toml"
      - "uv.lock"
      - "shared/**"
      - "services/**"
      - "infra/**"
  push:
    branches:
      - main
    paths:
      - ".github/workflows/backend-ci-cd.yml"
      - "pyproject.toml"
      - "uv.lock"
      - "shared/**"
      - "services/**"
      - "infra/**"

jobs:
  ruff-lint:
    name: Ruff lint
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Setup uv
        uses: astral-sh/setup-uv@v5

      - name: Install dependencies
        run: uv sync --dev

      - name: Run Ruff checks
        run: |
          uv run ruff check .

  mypy:
    name: Mypy
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Setup uv
        uses: astral-sh/setup-uv@v5

      - name: Install dependencies
        run: uv sync --dev

      - name: Run mypy
        run: uv run mypy shared/grading_shared

  pytest:
    name: Pytest
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Setup uv
        uses: astral-sh/setup-uv@v5

      - name: Install dependencies
        run: uv sync --dev

      - name: Run pytest
        run: |
          set -euo pipefail
          if [ -d "tests" ] || [ -n "$(ls -1 shared/tests services/*/tests 2>/dev/null || true)" ]; then
            uv run pytest
          else
            echo "No tests found yet. Skipping execution."
          fi

  cdk-synth:
    name: CDK synth
    runs-on: ubuntu-latest
    permissions:
      id-token: write
      contents: read
    env:
      AWS_REGION: ${{ vars.AWS_REGION || 'eu-west-3' }}
      AWS_OIDC_ROLE_ARN: ${{ vars.AWS_OIDC_ROLE_ARN }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Setup uv
        uses: astral-sh/setup-uv@v5

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Validate OIDC role configuration
        run: |
          if [ -z "${AWS_OIDC_ROLE_ARN}" ]; then
            echo "Repository variable AWS_OIDC_ROLE_ARN must be set for OIDC authentication."
            exit 1
          fi

      - name: Configure AWS credentials (OIDC)
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ env.AWS_OIDC_ROLE_ARN }}
          role-session-name: github-actions-cdk-synth
          aws-region: ${{ env.AWS_REGION }}

      - name: Install AWS CDK CLI
        run: npm install -g aws-cdk

      - name: Install infra dependencies
        run: uv sync --directory infra

      - name: Run CDK synth
        working-directory: infra
        run: uv run cdk synth
