name: Backend CI/CD

on:
  pull_request:
    branches:
      - main
    paths:
      - ".github/workflows/backend-ci-cd.yml"
      - "pyproject.toml"
      - "uv.lock"
      - "shared/**"
      - "services/**"
      - "infra/**"
  push:
    branches:
      - main
    paths:
      - ".github/workflows/backend-ci-cd.yml"
      - "pyproject.toml"
      - "uv.lock"
      - "shared/**"
      - "services/**"
      - "infra/**"

jobs:
  ruff-lint:
    name: Ruff lint
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Setup uv
        uses: astral-sh/setup-uv@v5

      - name: Install dependencies
        run: uv sync --dev

      - name: Run Ruff checks
        run: |
          uv run ruff check .

  mypy:
    name: Mypy
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Setup uv
        uses: astral-sh/setup-uv@v5

      - name: Install dependencies
        run: |
          uv sync --dev
          uv sync --package grading_shared --inexact

      - name: Run mypy
        run: uv run mypy shared/grading_shared

  pytest:
    name: Pytest
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Setup uv
        uses: astral-sh/setup-uv@v5

      - name: Install dependencies
        run: |
          uv sync --dev
          uv sync --package exam-api --inexact
          uv sync --directory infra

      - name: Run pytest
        run: |
          set -euo pipefail
          if [ -d "tests" ] || [ -n "$(ls -1 shared/tests services/*/tests infra/tests 2>/dev/null || true)" ]; then
            if [ -d "tests" ]; then
              uv run pytest tests/
            fi
            if [ -d "shared/tests" ]; then
              (cd shared && uv run pytest tests/)
            fi
            for svc in services/*/; do
              if [ -d "${svc}tests" ]; then
                (cd "$svc" && uv run pytest tests/)
              fi
            done
            (cd infra && uv run pytest tests/)
          else
            echo "No tests found yet. Skipping execution."
          fi
          (cd infra && uv sync --all-groups && uv run pytest tests/)

  cdk-synth:
    name: CDK synth & diff
    runs-on: ubuntu-latest
    permissions:
      id-token: write
      contents: read
      pull-requests: write
    env:
      AWS_REGION: ${{ vars.AWS_REGION || 'eu-west-1' }}
      AWS_OIDC_ROLE_ARN: ${{ vars.AWS_OIDC_ROLE_ARN }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Setup uv
        uses: astral-sh/setup-uv@v5

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "22"

      - name: Validate OIDC role configuration
        run: |
          if [ -z "${AWS_OIDC_ROLE_ARN}" ]; then
            echo "Repository variable AWS_OIDC_ROLE_ARN is not set."
            echo "CDK synth will run without AWS credentials (works when no CDK lookups are required)."
          fi

      - name: Configure AWS credentials (OIDC)
        if: env.AWS_OIDC_ROLE_ARN != ''
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ env.AWS_OIDC_ROLE_ARN }}
          role-session-name: github-actions-cdk-synth
          aws-region: ${{ env.AWS_REGION }}

      - name: Install AWS CDK CLI
        run: npm install -g aws-cdk

      - name: Install infra dependencies
        run: uv sync --directory infra

      - name: Resolve CDK environment
        if: env.AWS_OIDC_ROLE_ARN != ''
        run: |
          set -euo pipefail
          account="$(aws sts get-caller-identity --query Account --output text)"
          echo "CDK_DEFAULT_ACCOUNT=${account}" >> "$GITHUB_ENV"
          echo "CDK_DEFAULT_REGION=${AWS_REGION}" >> "$GITHUB_ENV"

      - name: Run CDK synth
        working-directory: infra
        run: uv run cdk synth

      - name: Run CDK diff
        if: github.event_name == 'pull_request'
        id: cdk-diff
        working-directory: infra
        run: |
          set +e
          uv run cdk diff --no-color > diff.txt 2>&1
          status=$?
          echo "exitcode=${status}" >> "$GITHUB_OUTPUT"
          cat diff.txt
          # cdk diff exits 1 when differences exist — that's expected on PRs.
          if [ "${status}" -gt 1 ]; then exit "${status}"; fi

      - name: Post CDK diff as PR comment
        if: github.event_name == 'pull_request'
        uses: actions/github-script@v7
        env:
          DIFF_EXIT: ${{ steps.cdk-diff.outputs.exitcode }}
        with:
          script: |
            const fs = require('fs');
            const marker = '<!-- cdk-diff -->';
            const max = 60_000;
            let raw = fs.readFileSync('infra/diff.txt', 'utf8');
            if (raw.length > max) {
              raw = raw.slice(0, max) + '\n... (truncated)';
            }
            const exit = process.env.DIFF_EXIT || '?';
            const header = exit === '0'
              ? 'No infrastructure changes.'
              : 'Infrastructure changes detected.';
            const body = `${marker}\n## CDK diff\n\n${header}\n\n<details><summary>Full output</summary>\n\n\`\`\`\n${raw}\n\`\`\`\n\n</details>`;
            const { owner, repo } = context.repo;
            const issue_number = context.payload.pull_request.number;
            const existing = await github.paginate(
              github.rest.issues.listComments,
              { owner, repo, issue_number, per_page: 100 },
            );
            const previous = existing.find(c => c.body && c.body.startsWith(marker));
            if (previous) {
              await github.rest.issues.updateComment({ owner, repo, comment_id: previous.id, body });
            } else {
              await github.rest.issues.createComment({ owner, repo, issue_number, body });
            }
