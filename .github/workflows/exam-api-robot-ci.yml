name: Exam API Robot CI

on:
  pull_request:
    paths:
      - ".github/workflows/exam-api-robot-ci.yml"
      - "services/exam-api/**"
  push:
    branches:
      - main
    paths:
      - ".github/workflows/exam-api-robot-ci.yml"
      - "services/exam-api/**"
  workflow_dispatch:

permissions:
  id-token: write
  contents: read

jobs:
  robot-localstack:
    name: Robot tests on LocalStack
    runs-on: ubuntu-latest
    env:
      BASE_URL: http://localhost:8000
      AWS_REGION: ${{ vars.AWS_REGION || 'eu-west-1' }}
      ADMIN_EMAIL: ${{ secrets.CI_ADMIN_EMAIL }}
      ADMIN_PASSWORD: ${{ secrets.CI_ADMIN_PASSWORD }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install Robot Framework dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install awscli robotframework robotframework-requests

      - name: Configure AWS credentials (OIDC)
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.CI_AWS_OIDC_ROLE_ARN }}
          role-session-name: exam-api-robot-ci
          aws-region: ${{ env.AWS_REGION }}

      - name: Verify AWS caller identity
        run: aws sts get-caller-identity

      - name: Validate required secrets
        run: |
          set -euo pipefail
          required_vars=(
            ADMIN_EMAIL
            ADMIN_PASSWORD
          )
          for var in "${required_vars[@]}"; do
            if [ -z "${!var:-}" ]; then
              echo "Missing required secret/environment variable: ${var}"
              exit 1
            fi
          done

      - name: Start LocalStack + DB + migrations
        working-directory: services/exam-api
        run: |
          set -euo pipefail
          chmod +x localstack-up.sh
          ./localstack-up.sh

      - name: Create Cognito test resources in AWS
        run: |
          set -euo pipefail
          pool_id="$(aws cognito-idp create-user-pool \
            --pool-name "exam-api-ci-${GITHUB_RUN_ID}-${GITHUB_RUN_ATTEMPT}" \
            --query 'UserPool.Id' --output text)"
          client_id="$(aws cognito-idp create-user-pool-client \
            --user-pool-id "${pool_id}" \
            --client-name "exam-api-ci-client" \
            --explicit-auth-flows ALLOW_USER_PASSWORD_AUTH ALLOW_REFRESH_TOKEN_AUTH \
            --query 'UserPoolClient.ClientId' --output text)"

          for group_name in admin teachers students; do
            aws cognito-idp create-group \
              --user-pool-id "${pool_id}" \
              --group-name "${group_name}" >/dev/null
          done

          aws cognito-idp admin-create-user \
            --user-pool-id "${pool_id}" \
            --username "${ADMIN_EMAIL}" \
            --user-attributes Name=email,Value="${ADMIN_EMAIL}" Name=email_verified,Value=true \
            --message-action SUPPRESS >/dev/null
          aws cognito-idp admin-set-user-password \
            --user-pool-id "${pool_id}" \
            --username "${ADMIN_EMAIL}" \
            --password "${ADMIN_PASSWORD}" \
            --permanent >/dev/null
          aws cognito-idp admin-add-user-to-group \
            --user-pool-id "${pool_id}" \
            --username "${ADMIN_EMAIL}" \
            --group-name admin >/dev/null

          issuer_url="https://cognito-idp.${AWS_REGION}.amazonaws.com/${pool_id}"
          {
            echo "COGNITO_USER_POOL_ID=${pool_id}"
            echo "COGNITO_APP_CLIENT_ID=${client_id}"
            echo "COGNITO_ISSUER_URL=${issuer_url}"
            echo "CREATED_COGNITO_USER_POOL_ID=${pool_id}"
          } >> "${GITHUB_ENV}"

      - name: Prime LocalStack env file with Cognito settings
        working-directory: services/exam-api
        run: |
          set -euo pipefail
          python - <<'PY'
          from pathlib import Path
          import os

          env_path = Path(".env.localstack")
          content = env_path.read_text(encoding="utf-8")
          replacements = {
              "AWS_REGION": os.environ["AWS_REGION"],
              "COGNITO_USER_POOL_ID": os.environ["COGNITO_USER_POOL_ID"],
              "COGNITO_APP_CLIENT_ID": os.environ["COGNITO_APP_CLIENT_ID"],
              "COGNITO_ISSUER_URL": os.environ["COGNITO_ISSUER_URL"],
              "AWS_ACCESS_KEY_ID": os.environ["AWS_ACCESS_KEY_ID"],
              "AWS_SECRET_ACCESS_KEY": os.environ["AWS_SECRET_ACCESS_KEY"],
          }
          session_token = os.environ.get("AWS_SESSION_TOKEN", "")
          if session_token:
              replacements["AWS_SESSION_TOKEN"] = session_token
          lines = []
          seen = set()
          for line in content.splitlines():
              if "=" in line and not line.lstrip().startswith("#"):
                  key = line.split("=", 1)[0]
                  if key in replacements:
                      line = f"{key}={replacements[key]}"
                      seen.add(key)
              lines.append(line)
          for key, value in replacements.items():
              if key not in seen:
                  lines.append(f"{key}={value}")
          env_path.write_text("\n".join(lines) + "\n", encoding="utf-8")
          PY

      - name: Start exam-api container
        working-directory: services/exam-api
        run: |
          set -euo pipefail
          docker compose -f docker-compose.localstack.yml up -d --build exam-api

      - name: Wait for API availability
        run: |
          set -euo pipefail
          for _ in $(seq 1 60); do
            if curl -sf "${BASE_URL}/docs" >/dev/null 2>&1; then
              exit 0
            fi
            sleep 2
          done
          docker compose -f services/exam-api/docker-compose.localstack.yml logs exam-api
          exit 1

      - name: Run Robot API checks
        run: |
          set -euo pipefail
          robot \
            --outputdir services/exam-api/tests/robot/results \
            services/exam-api/tests/robot/exam_api_ci.robot

      - name: Upload Robot reports
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: exam-api-robot-reports
          path: services/exam-api/tests/robot/results

      - name: Teardown docker stack
        if: always()
        working-directory: services/exam-api
        run: |
          set +e
          if [ -n "${CREATED_COGNITO_USER_POOL_ID:-}" ]; then
            aws cognito-idp delete-user-pool \
              --user-pool-id "${CREATED_COGNITO_USER_POOL_ID}"
          fi
          docker compose -f docker-compose.localstack.yml down -v --remove-orphans
